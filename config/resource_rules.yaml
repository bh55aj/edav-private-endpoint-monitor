# ---------------------------------------------------------------------------
# Microsoft.Sql/managedInstances
# ---------------------------------------------------------------------------
Microsoft.Sql/managedInstances:
  display_name: "SQL Managed Instance"
  auto_delete_supported: false
  default_classification: REVIEW_REQUIRED
  validation_steps:
    - check_databases_count
    - check_backup_retention_policy
    - check_private_endpoints
    - check_active_connections
    - check_failover_group
    - check_terraform_managed
    - check_azure_lock
  notes: "Never auto-delete. Requires DBA approval and team lead sign-off."

# ---------------------------------------------------------------------------
# Microsoft.MachineLearningServices/workspaces
# ---------------------------------------------------------------------------
Microsoft.MachineLearningServices/workspaces:
  display_name: "Azure ML Workspace"
  auto_delete_supported: false
  default_classification: REVIEW_REQUIRED
  validation_steps:
    - check_compute_clusters
    - check_compute_instances
    - check_datasets
    - check_experiments
    - check_endpoints
    - check_pipelines
    - check_private_endpoints
    - check_linked_storage
    - check_linked_key_vault
    - check_terraform_managed
    - check_azure_lock
  notes: "Never auto-delete AML workspaces. Check all compute, datasets, experiments, and pipelines first."

# ---------------------------------------------------------------------------
# Fallback for unknown/unsupported resource types
# ---------------------------------------------------------------------------
DEFAULT:
  display_name: "Unknown Resource Type"
  auto_delete_supported: false
  default_classification: UNKNOWN
  validation_steps:
    - check_resource_exists
    - check_tags
    - check_terraform_managed
    - check_azure_lock
  notes: "Unsupported resource type. Manual review required. Escalate to platform team."
